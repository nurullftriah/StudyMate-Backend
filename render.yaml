services:
  - type: web
    name: studymate-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGODB_URI
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRES_IN
        value: 7d

      - key: ALLOWED_ORIGIN
        sync: false